<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLEACH | GG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #0b0f13; color: #fff; font-family: 'Inter', sans-serif; }
        
        /* Glassmorphism со скриншота */
        .glass-panel { 
            background: linear-gradient(135deg, rgba(35, 43, 53, 0.6) 0%, rgba(18, 22, 28, 0.8) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
        }

        .neon-border { border: 1px solid rgba(34, 211, 238, 0.3); box-shadow: 0 0 15px rgba(34, 211, 238, 0.1); }
        .text-neon { color: #22d3ee; text-shadow: 0 0 10px rgba(34, 211, 238, 0.5); }
        .tag-gold { color: #facc15; text-shadow: 0 0 20px rgba(250, 204, 21, 0.4); }

        /* Таблица как на фото */
        .member-row { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; }
        .member-row:hover { border-color: rgba(34, 211, 238, 0.5); background: rgba(34, 211, 238, 0.05); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal.active { display: flex; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8 max-w-7xl mx-auto">

    <header class="flex justify-between items-center mb-10">
        <h1 class="text-4xl md:text-5xl font-black italic tracking-tighter uppercase">BLEACH <span class="text-gray-500">|</span> GG</h1>
        <div id="auth-ui">
            <button onclick="document.getElementById('m-login').classList.add('active')" class="glass-panel px-6 py-2 text-[10px] font-bold uppercase border border-white/10 hover:bg-white/5 transition">Войти / Регистрация</button>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-12">
        <div class="glass-panel p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-sm font-bold uppercase tracking-tight">Статистика Пуша Кубков</h2>
                <div class="flex gap-2 text-[10px] font-bold opacity-50 uppercase">
                    <span>1д</span><span>1м</span><span class="text-white">Все</span>
                </div>
            </div>
            <div id="main-chart" class="w-full h-[280px]"></div>
        </div>

        <div class="glass-panel p-6 flex flex-col">
            <h2 class="text-sm font-bold uppercase tracking-tight mb-6">Топ Участников</h2>
            <div class="grid grid-cols-4 text-[10px] font-bold opacity-30 uppercase mb-4 px-4">
                <span>#</span><span>Игрок</span><span>#TAG</span><span class="text-right">Trophies</span>
            </div>
            <div id="members-list" class="space-y-2 flex-grow overflow-y-auto pr-2">
                </div>
            <button class="w-full mt-4 py-2 glass-panel text-[10px] font-bold uppercase opacity-50 hover:opacity-100 transition">Показать еще</button>
        </div>
    </div>

    <div class="text-center mb-20">
        <h2 class="text-5xl md:text-6xl font-black tracking-widest tag-gold uppercase">#CLLRR228</h2>
    </div>

    <section>
        <h3 class="text-sm font-bold uppercase mb-8 opacity-70">News Section</h3>
        <div id="news-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            </div>
    </section>

    <div id="m-login" class="modal">
        <div class="glass-panel p-8 w-full max-w-xs border border-cyan-500/30">
            <h2 class="text-xl font-black mb-6 uppercase italic">Admin Access</h2>
            <input id="u" type="text" placeholder="ЛОГИН" class="w-full bg-black/40 p-4 rounded-xl mb-3 outline-none border border-white/5 focus:border-cyan-500/50">
            <input id="p" type="password" placeholder="ПАРОЛЬ" class="w-full bg-black/40 p-4 rounded-xl mb-6 outline-none border border-white/5 focus:border-cyan-500/50">
            <button onclick="handleLogin()" class="w-full bg-cyan-500 text-black font-black py-4 rounded-xl uppercase tracking-widest text-xs shadow-lg shadow-cyan-500/20">Войти</button>
            <button onclick="this.closest('.modal').classList.remove('active')" class="w-full mt-4 text-[10px] opacity-30 uppercase">Отмена</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://bleach1.evgen20111110.workers.dev/api';

        async function handleLogin() {
            const r = await fetch(`${API_URL}/login`, {
                method: 'POST',
                body: JSON.stringify({ login: document.getElementById('u').value, password: document.getElementById('p').value })
            });
            if(r.ok) { localStorage.setItem('adm_auth', '1'); location.reload(); }
            else { alert('Неверные данные'); }
        }

        async function init() {
            if(localStorage.getItem('adm_auth')) {
                document.getElementById('auth-ui').innerHTML = `<button onclick="localStorage.clear();location.reload()" class="text-neon text-[10px] font-bold border border-cyan-500/30 px-4 py-2 rounded-lg">ВЫЙТИ (АДМИН)</button>`;
            }

            try {
                const res = await fetch(`${API_URL}/data`);
                const data = await res.json();

                // Рендер игроков
                document.getElementById('members-list').innerHTML = data.club.members.sort((a,b)=>b.trophies-a.trophies).slice(0,6).map((m, i) => `
                    <div class="member-row grid grid-cols-4 items-center p-3 rounded-xl px-4">
                        <span class="text-[10px] font-black opacity-20">${i+1}.</span>
                        <span class="text-xs font-bold truncate pr-2">${m.name}</span>
                        <span class="text-[9px] opacity-40 font-mono">${m.tag}</span>
                        <span class="text-right text-xs font-black text-neon">${m.trophies.toLocaleString()} 🏆</span>
                    </div>
                `).join('');

                // Рендер графика
                const chart = LightweightCharts.createChart(document.getElementById('main-chart'), {
                    layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#445' },
                    grid: { vertLines: { color: 'rgba(255,255,255,0.02)' }, horzLines: { color: 'rgba(255,255,255,0.02)' } },
                    timeScale: { borderVisible: false },
                    rightPriceScale: { borderVisible: false }
                });

                const lineStyle = { lineWidth: 3, lineType: 0 };
                const s1 = chart.addAreaSeries({ ...lineStyle, lineColor: '#22d3ee', topColor: 'rgba(34,211,238,0.1)', bottomColor: 'transparent' });
                const s2 = chart.addAreaSeries({ ...lineStyle, lineColor: '#3b82f6', topColor: 'rgba(59,130,246,0.1)', bottomColor: 'transparent' });
                
                const points = data.chart.map(p => ({ time: parseInt(p.time), value: parseInt(p.value) }));
                s1.setData(points.length ? points : [{time: 1711280000, value: 1500000}]);
                chart.timeScale().fitContent();

                // Рендер новостей
                document.getElementById('news-grid').innerHTML = data.news.map(n => `
                    <div class="glass-panel overflow-hidden group cursor-pointer border-none shadow-2xl">
                        <div class="aspect-video relative overflow-hidden">
                            <img src="${n.image_url}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                        </div>
                        <div class="p-4 bg-gradient-to-b from-transparent to-black/40">
                            <h4 class="text-xs font-bold leading-tight mb-2 uppercase">${n.title}</h4>
                            <span class="text-[9px] opacity-30 font-bold">${n.created_at.split(' ')[0]}</span>
                        </div>
                    </div>
                `).join('');

            } catch(e) { console.error('Data fail:', e); }
        }
        init();
    </script>
</body>
</html>
