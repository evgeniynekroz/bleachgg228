<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLEACH | GG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');
        body { background: #0d1117; color: white; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(30, 35, 45, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .text-gold { color: #facc15; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; padding: 15px; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        /* Чтобы текст не переносился криво */
        .no-wrap { white-space: nowrap; }
    </style>
</head>
<body class="p-3 md:p-8">

    <header class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
        <h1 class="text-3xl md:text-5xl font-black italic tracking-tighter no-wrap">BLEACH | GG</h1>
        <div id="auth-btn">
            <button onclick="openModal('login-modal')" class="glass px-6 py-2 text-sm font-bold">ВОЙТИ</button>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
        <div class="glass p-4">
            <h2 class="text-sm font-bold mb-4 uppercase opacity-50">Статистика кубков</h2>
            <div id="chart" class="w-full h-[200px]"></div>
        </div>
        <div class="glass p-4">
            <h2 class="text-sm font-bold mb-4 uppercase opacity-50">Топ участников</h2>
            <div id="list" class="space-y-2 max-h-[250px] overflow-y-auto pr-1"></div>
        </div>
    </div>

    <div class="text-center my-10">
        <h2 class="text-4xl md:text-7xl font-black text-gold tracking-widest">#CLLRR228</h2>
    </div>

    <section>
        <h3 class="font-bold mb-4 opacity-50 uppercase text-xs">Новости клуба</h3>
        <div id="news" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
    </section>

    <div id="login-modal" class="modal">
        <div class="glass p-6 w-full max-w-sm">
            <h2 class="text-xl font-bold mb-4">Админ-панель</h2>
            <input id="l-usr" type="text" placeholder="Логин" class="w-full bg-black/40 p-3 rounded-xl mb-3 border border-white/10 outline-none">
            <input id="l-pwd" type="password" placeholder="Пароль" class="w-full bg-black/40 p-3 rounded-xl mb-4 border border-white/10 outline-none">
            <button onclick="login()" class="w-full bg-white text-black font-black py-3 rounded-xl">ВОЙТИ</button>
            <button onclick="closeModal('login-modal')" class="w-full mt-2 text-xs opacity-50">Отмена</button>
        </div>
    </div>

    <div id="admin-modal" class="modal">
        <div class="glass p-6 w-full max-w-lg">
            <h2 class="text-xl font-bold mb-4">Новый пост</h2>
            <input id="p-tit" type="text" placeholder="Заголовок" class="w-full bg-black/40 p-3 rounded-xl mb-2 border border-white/10">
            <input id="p-img" type="text" placeholder="URL обложки" class="w-full bg-black/40 p-3 rounded-xl mb-2 border border-white/10">
            <textarea id="p-con" placeholder="Текст (Markdown)" class="w-full bg-black/40 p-3 rounded-xl mb-4 border border-white/10 h-32"></textarea>
            <button onclick="sendPost()" class="w-full bg-gold text-black font-black py-3 rounded-xl">ОПУБЛИКОВАТЬ</button>
        </div>
    </div>

    <script>
        const API = 'https://bleach1.evgen20111110.workers.dev/api';
        
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        async function login() {
            const res = await fetch(`${API}/login`, {
                method: 'POST',
                body: JSON.stringify({ login: btoa(document.getElementById('l-usr').value), password: btoa(document.getElementById('l-pwd').value) }) 
            });
            // Упростим для теста: просто проверяем статус
            if(res.ok) {
                localStorage.setItem('admin', 'true');
                location.reload();
            } else { alert('Ошибка!'); }
        }

        async function load() {
            if(localStorage.getItem('admin')) {
                document.getElementById('auth-btn').innerHTML = `<button onclick="openModal('admin-modal')" class="bg-white text-black px-6 py-2 rounded-full font-bold text-xs">+ ПОСТ</button>`;
            }

            const r = await fetch(`${API}/data`);
            const d = await r.json();

            // Таблица
            document.getElementById('list').innerHTML = d.club.members.sort((a,b)=>b.trophies-a.trophies).map((m, i) => `
                <div class="flex justify-between items-center p-3 glass bg-white/5 border-none">
                    <span class="text-xs font-bold opacity-30 w-6">${i+1}</span>
                    <span class="flex-grow text-sm font-bold truncate mr-2">${m.name}</span>
                    <span class="text-gold font-bold text-sm no-wrap">${m.trophies} 🏆</span>
                </div>
            `).join('');

            // График
            const chart = LightweightCharts.createChart(document.getElementById('chart'), {
                layout: { background: { color: 'transparent' }, textColor: '#555' },
                grid: { vertLines: { visible: false }, horzLines: { color: '#222' } },
                timeScale: { borderVisible: false }
            });
            const line = chart.addLineSeries({ color: '#facc15', lineWidth: 3 });
            line.setData(d.chart.length ? d.chart : [{time: 1711280000, value: 0}]);
            chart.timeScale().fitContent();

            // Новости
            document.getElementById('news').innerHTML = d.news.map(n => `
                <div class="glass aspect-square overflow-hidden relative group cursor-pointer">
                    <img src="${n.image_url}" class="absolute inset-0 w-full h-full object-cover opacity-50 group-hover:scale-110 transition">
                    <div class="absolute inset-0 p-3 flex flex-col justify-end bg-gradient-to-t from-black to-transparent">
                        <h4 class="text-[10px] md:text-xs font-bold leading-tight">${n.title}</h4>
                    </div>
                </div>
            `).join('');
        }

        async function sendPost() {
            const data = {
                title: document.getElementById('p-tit').value,
                cover_url: document.getElementById('p-img').value,
                content: document.getElementById('p-con').value
            };
            await fetch(`${API}/news`, { method: 'POST', body: JSON.stringify(data) });
            location.reload();
        }

        load();
    </script>
</body>
</html>
