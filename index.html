<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLEACH | GG</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --glass-bg:     rgba(255,255,255,0.07);
  --glass-border: rgba(255,255,255,0.13);
  --glass-shine:  rgba(255,255,255,0.18);
  --text:         #f0eeff;
  --text-dim:     rgba(240,238,255,0.4);
  --text-mid:     rgba(240,238,255,0.65);
  --accent:       #bf7fff;
  --accent2:      #7c3aed;
  --yellow:       #fbbf24;
  --red:          #f87171;
  --green:        #4ade80;
  --cyan:         #67e8f9;
  --purple:       #c084fc;
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0a0010;
  background-image: radial-gradient(ellipse 80% 60% at 50% 0%, #3b0764 0%, #1a0030 40%, #000 100%);
  background-attachment: fixed;
  min-height: 100vh;
  color: var(--text);
  overflow-x: hidden;
}
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
}
.glass {
  background: var(--glass-bg);
  backdrop-filter: blur(24px) saturate(160%);
  -webkit-backdrop-filter: blur(24px) saturate(160%);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  position: relative;
  overflow: hidden;
}
.glass::before {
  content:''; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
  background: linear-gradient(135deg, var(--glass-shine) 0%, transparent 45%);
}
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  padding:9px 18px; border-radius:50px;
  font-family:'Inter',sans-serif; font-size:13px; font-weight:600; cursor:pointer;
  transition:all 0.18s ease;
  border:1px solid rgba(255,255,255,0.18);
  background:rgba(255,255,255,0.09);
  color:var(--text);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  white-space:nowrap; letter-spacing:0.2px;
}
.btn:hover  { background:rgba(255,255,255,0.15); border-color:rgba(255,255,255,0.28); transform:scale(1.02); }
.btn:active { transform:scale(0.97); }
.btn.accent { background:rgba(124,58,237,0.38); border-color:rgba(191,127,255,0.45); color:#e9d5ff; }
.btn.accent:hover { background:rgba(124,58,237,0.55); }
.btn.wide { width:100%; justify-content:center; border-radius:14px; padding:12px; font-size:14px; font-weight:700; }
.page { max-width:1200px; margin:0 auto; padding:0 16px 80px; }
header { display:flex; align-items:center; justify-content:space-between; padding:20px 0 22px; gap:12px; flex-wrap:wrap; }
.logo { display:flex; align-items:center; gap:12px; }
.logo-badge {
  width:48px; height:48px; border-radius:13px; overflow:hidden;
  background:rgba(255,255,255,0.07); border:1px solid var(--glass-border);
  display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:28px;
}
.logo-badge img { width:100%; height:100%; object-fit:contain; display:none; }
.logo-name {
  font-size:21px; font-weight:800; letter-spacing:-0.5px;
  background:linear-gradient(120deg,#fff 0%,var(--accent) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.logo-tag { font-size:10px; font-weight:600; color:var(--text-dim); letter-spacing:1.2px; text-transform:uppercase; margin-top:1px; }
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
.stat-card { padding:14px 10px; text-align:center; }
.stat-val {
  font-size:clamp(18px,5vw,26px); font-weight:800; letter-spacing:-1px; line-height:1; margin-bottom:3px;
  background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.stat-lbl { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); }
.sec-title {
  font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.8px;
  color:var(--text-dim); margin-bottom:12px; display:flex; align-items:center; gap:8px;
}
.sec-title::after { content:''; flex:1; height:1px; background:var(--glass-border); }
.main-grid { display:grid; grid-template-columns:1fr; gap:14px; margin-bottom:16px; }
@media(min-width:860px){ .main-grid{ grid-template-columns:1fr 1fr; } }

/* ── CUSTOM CHART ── */
.chart-card { padding:18px; }
.chart-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:8px; }
.chart-filters { display:flex; gap:6px; }
.cf-btn {
  padding:4px 12px; border-radius:50px; font-size:11px; font-weight:600; cursor:pointer;
  border:1px solid var(--glass-border); background:transparent; color:var(--text-dim); transition:all .14s;
}
.cf-btn:hover,.cf-btn.active { background:rgba(191,127,255,0.18); border-color:var(--accent); color:var(--accent); }
.chart-wrap { position:relative; width:100%; height:220px; }
#myChart { width:100%; height:100%; display:block; cursor:crosshair; }
.chart-tooltip {
  position:absolute; pointer-events:none;
  background:rgba(20,0,40,0.92); border:1px solid rgba(191,127,255,0.4);
  border-radius:10px; padding:8px 12px;
  font-size:12px; font-weight:700; color:#fff;
  backdrop-filter:blur(12px); white-space:nowrap;
  opacity:0; transition:opacity .15s;
  z-index:10;
}
.chart-tooltip .tt-date { font-size:10px; color:var(--text-dim); margin-bottom:2px; font-weight:600; }
.chart-tooltip .tt-val  { color:var(--yellow); font-size:14px; }

/* ── MEMBERS ── */
.members-card { padding:18px; }
.members-head {
  display:grid; grid-template-columns:28px 36px 1fr 72px;
  font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:1.2px;
  color:var(--text-dim); padding:0 8px; margin-bottom:6px; gap:8px;
}
@media(min-width:480px){ .members-head,.member-row { grid-template-columns:28px 36px 1fr 90px 72px; } }
.member-row {
  display:grid; grid-template-columns:28px 36px 1fr 72px;
  align-items:center; gap:8px; padding:9px 8px; border-radius:12px;
  transition:background .14s; margin-bottom:3px; cursor:default;
}
.member-row:hover { background:rgba(255,255,255,0.05); }
.m-rank { font-size:12px; font-weight:800; text-align:center; color:var(--text-dim); }
.m-rank.gold   { color:var(--yellow); }
.m-rank.silver { color:#cbd5e1; }
.m-rank.bronze { color:#cd7c2f; }
.m-avatar {
  width:34px; height:34px; border-radius:50%;
  background:rgba(255,255,255,0.07); border:1px solid var(--glass-border);
  overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;
}
.m-avatar img { width:100%; height:100%; object-fit:cover; }
.m-info { min-width:0; }
.m-name { font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.2; }
.m-role { font-size:10px; font-weight:600; margin-top:2px; white-space:nowrap; }
.role-president  { color:var(--yellow); }
.role-vice       { color:var(--purple); }
.role-senior     { color:var(--cyan); }
.role-member     { color:var(--text-dim); }
.m-tag-col { font-size:10px; font-weight:600; color:var(--text-dim); font-family:monospace; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:none; }
@media(min-width:480px){ .m-tag-col { display:block; } }
.m-trophies { text-align:right; font-size:13px; font-weight:800; color:var(--yellow); white-space:nowrap; }
.news-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:16px; }
@media(min-width:600px){ .news-grid{ grid-template-columns:repeat(4,1fr); } }
.news-card { overflow:hidden; cursor:pointer; transition:transform .18s; }
.news-card:hover { transform:translateY(-3px); }
.news-thumb { aspect-ratio:16/9; background:rgba(255,255,255,0.05); overflow:hidden; }
.news-thumb img { width:100%; height:100%; object-fit:cover; transition:transform .3s; display:block; }
.news-card:hover .news-thumb img { transform:scale(1.06); }
.news-body { padding:10px 12px 12px; }
.news-title { font-size:11px; font-weight:700; line-height:1.4; text-transform:uppercase; letter-spacing:0.2px; margin-bottom:4px; }
.news-date  { font-size:9px; font-weight:600; color:var(--text-dim); text-transform:uppercase; }
.modal {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65);
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  z-index:1000; align-items:center; justify-content:center; padding:20px;
}
.modal.active { display:flex; }
.modal-box { width:100%; max-width:380px; padding:26px 22px; max-height:90vh; overflow-y:auto; }
.modal-box.wide { max-width:520px; }
.modal-title {
  font-size:20px; font-weight:800; letter-spacing:-0.4px; margin-bottom:18px; text-align:center;
  background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.modal-tabs {
  display:flex; background:rgba(255,255,255,0.05); border-radius:12px;
  padding:3px; margin-bottom:18px; border:1px solid var(--glass-border);
}
.mtab {
  flex:1; padding:8px; background:transparent; border:none; border-radius:10px;
  color:var(--text-dim); font-size:13px; font-weight:600; cursor:pointer; transition:all .14s;
}
.mtab.active { background:rgba(124,58,237,0.38); color:var(--text); border:1px solid rgba(191,127,255,0.3); }
.m-input {
  display:block; width:100%;
  background:rgba(255,255,255,0.06); border:1px solid var(--glass-border); border-radius:12px;
  padding:11px 14px; color:var(--text); font-family:'Inter',sans-serif; font-size:14px; font-weight:500;
  outline:none; margin-bottom:10px; transition:border-color .14s, background .14s;
}
.m-input::placeholder { color:var(--text-dim); }
.m-input:focus { border-color:rgba(191,127,255,0.5); background:rgba(255,255,255,0.09); }
textarea.m-input { resize:vertical; min-height:80px; }
.m-err { font-size:11px; font-weight:600; color:var(--red); text-align:center; min-height:16px; margin-bottom:8px; }
.m-cancel { display:block; width:100%; padding:9px; background:none; border:none; color:var(--text-dim); font-size:12px; font-weight:600; cursor:pointer; margin-top:8px; }
.m-cancel:hover { color:var(--text); }
.admin-panel { padding:18px; margin-bottom:16px; }
.admin-top { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
.admin-badge {
  background:rgba(251,191,36,0.15); border:1px solid rgba(251,191,36,0.3);
  color:var(--yellow); font-size:9px; font-weight:700; padding:2px 8px;
  border-radius:50px; text-transform:uppercase; letter-spacing:1px;
}
.user-pill {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,0.07); border:1px solid var(--glass-border);
  border-radius:50px; padding:5px 12px 5px 7px; backdrop-filter:blur(16px);
}
.user-avatar-sm { width:26px; height:26px; border-radius:50%; background:rgba(124,58,237,0.3); display:flex; align-items:center; justify-content:center; font-size:13px; }
.user-name-txt { font-size:13px; font-weight:700; }
.user-role-txt { font-size:10px; font-weight:600; color:var(--accent); }
.skel {
  background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.04) 75%);
  background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:10px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.empty { text-align:center; padding:28px; color:var(--text-dim); font-size:13px; font-weight:500; }
.news-modal-img { width:100%; aspect-ratio:16/9; object-fit:cover; border-radius:12px; margin-bottom:16px; display:block; background:rgba(255,255,255,0.05); }
.news-modal-title { font-size:18px; font-weight:800; line-height:1.3; margin-bottom:8px; }
.news-modal-date  { font-size:11px; font-weight:600; color:var(--text-dim); margin-bottom:14px; text-transform:uppercase; }
.news-modal-body  { font-size:14px; line-height:1.7; color:var(--text-mid); white-space:pre-wrap; }
</style>

<script>
const API = 'https://bleach1.evgen20111110.workers.dev/api';
let allMembers=[], showCount=5, chartData=[], filteredData=[];

// ── FORMAT ──
function fmtK(v) {
  if(v>=1000000) return (v/1000000).toFixed(1).replace('.0','')+'M';
  if(v>=1000)    return (v/1000).toFixed(0)+'K';
  return v.toString();
}
function fmtDate(ts) {
  const d=new Date(ts*1000);
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}`;
}
function fmtFull(ts) {
  const d=new Date(ts*1000);
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
}

// ── CUSTOM CHART ──
const canvas  = document.getElementById('myChart');
const tooltip = document.getElementById('chartTooltip');
const ctx     = canvas.getContext('2d');
let hovIdx = -1;

function resizeCanvas() {
  const wrap = canvas.parentElement;
  canvas.width  = wrap.clientWidth  * devicePixelRatio;
  canvas.height = wrap.clientHeight * devicePixelRatio;
  canvas.style.width  = wrap.clientWidth  + 'px';
  canvas.style.height = wrap.clientHeight + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
  drawChart(filteredData);
}

function drawChart(pts) {
  if(!pts||!pts.length) return;
  const W = canvas.clientWidth;
  const H = canvas.clientHeight;
  const PAD_L=42, PAD_R=12, PAD_T=14, PAD_B=52;
  const cW=W-PAD_L-PAD_R, cH=H-PAD_T-PAD_B;

  ctx.clearRect(0,0,W,H);

  const vals = pts.map(p=>p.value);
  const minV = Math.min(...vals);
  const maxV = Math.max(...vals);
  const rng  = maxV-minV || 1;

  const xOf = i => PAD_L + (i/(pts.length-1||1))*cW;
  const yOf = v => PAD_T + (1-(v-minV)/rng)*cH;

  // Grid lines (4 horizontal)
  ctx.strokeStyle='rgba(255,255,255,0.06)';
  ctx.lineWidth=1;
  for(let i=0;i<=3;i++) {
    const y=PAD_T+i*(cH/3);
    ctx.beginPath(); ctx.moveTo(PAD_L,y); ctx.lineTo(PAD_L+cW,y); ctx.stroke();
    // Y labels
    const val=maxV-(i/3)*rng;
    ctx.fillStyle='rgba(240,238,255,0.35)';
    ctx.font='bold 10px Inter,sans-serif';
    ctx.textAlign='right';
    ctx.fillText(fmtK(Math.round(val)), PAD_L-6, y+4);
  }

  // Area fill
  const grad=ctx.createLinearGradient(0,PAD_T,0,PAD_T+cH);
  grad.addColorStop(0,'rgba(192,132,252,0.28)');
  grad.addColorStop(1,'rgba(192,132,252,0.0)');
  ctx.beginPath();
  pts.forEach((p,i)=>{
    const x=xOf(i), y=yOf(p.value);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.lineTo(xOf(pts.length-1), PAD_T+cH);
  ctx.lineTo(xOf(0), PAD_T+cH);
  ctx.closePath();
  ctx.fillStyle=grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle='#c084fc';
  ctx.lineWidth=2.5;
  ctx.lineJoin='round';
  pts.forEach((p,i)=>{
    const x=xOf(i), y=yOf(p.value);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Dots + hover
  pts.forEach((p,i)=>{
    const x=xOf(i), y=yOf(p.value);
    const isHov=i===hovIdx;
    ctx.beginPath();
    ctx.arc(x,y,isHov?5:3,0,Math.PI*2);
    ctx.fillStyle=isHov?'#fff':'#c084fc';
    ctx.fill();
    if(isHov) {
      ctx.strokeStyle='rgba(192,132,252,0.5)';
      ctx.lineWidth=2;
      ctx.stroke();
    }
  });

  // X axis dates — diagonal
  const step = Math.max(1, Math.floor(pts.length/6));
  ctx.fillStyle='rgba(240,238,255,0.4)';
  ctx.font='bold 10px Inter,sans-serif';
  ctx.textAlign='left';
  pts.forEach((p,i)=>{
    if(i%step!==0 && i!==pts.length-1) return;
    const x=xOf(i);
    ctx.save();
    ctx.translate(x, PAD_T+cH+10);
    ctx.rotate(-Math.PI/5);
    ctx.fillText(fmtDate(p.time), 0, 0);
    ctx.restore();
  });

  // Hover vertical line
  if(hovIdx>=0) {
    const x=xOf(hovIdx);
    ctx.beginPath();
    ctx.strokeStyle='rgba(192,132,252,0.35)';
    ctx.lineWidth=1;
    ctx.setLineDash([4,3]);
    ctx.moveTo(x,PAD_T); ctx.lineTo(x,PAD_T+cH);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

// Tooltip interaction
function getHovIdx(pts, ex) {
  if(!pts.length) return -1;
  const W=canvas.clientWidth;
  const PAD_L=42,PAD_R=12;
  const cW=W-PAD_L-PAD_R;
  const rel=ex-PAD_L;
  const idx=Math.round((rel/cW)*(pts.length-1));
  return Math.max(0,Math.min(pts.length-1,idx));
}

function onChartMove(e) {
  if(!filteredData.length) return;
  const rect=canvas.getBoundingClientRect();
  const ex=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
  hovIdx=getHovIdx(filteredData,ex);
  drawChart(filteredData);

  const p=filteredData[hovIdx];
  const W=canvas.clientWidth;
  const PAD_L=42,PAD_R=12,PAD_T=14,PAD_B=52,cW=W-PAD_L-PAD_R;
  const x=PAD_L+(hovIdx/(filteredData.length-1||1))*cW;

  document.getElementById('tt-date').textContent=fmtFull(p.time);
  document.getElementById('tt-val').textContent=p.value.toLocaleString()+' 🏆';
  tooltip.style.opacity='1';
  const tx=Math.min(x, W-140);
  tooltip.style.left=tx+'px';
  tooltip.style.top=(PAD_T-40)+'px';
}
function onChartLeave() {
  hovIdx=-1;
  drawChart(filteredData);
  tooltip.style.opacity='0';
}
canvas.addEventListener('mousemove', onChartMove);
canvas.addEventListener('touchmove', e=>{e.preventDefault();onChartMove(e);},{passive:false});
canvas.addEventListener('mouseleave', onChartLeave);
canvas.addEventListener('touchend', onChartLeave);

function filterChart(r,btn) {
  document.querySelectorAll('.cf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const now=Math.floor(Date.now()/1000);
  let f=[...chartData];
  if(r==='1d') f=chartData.filter(p=>p.time>=now-86400);
  if(r==='1m') f=chartData.filter(p=>p.time>=now-2592000);
  filteredData=f.length?f:chartData;
  hovIdx=-1;
  drawChart(filteredData);
}

new ResizeObserver(resizeCanvas).observe(canvas.parentElement);

// ── ROLES ──
const ROLES={
  president:     {label:'President',      cls:'role-president'},
  vicePresident: {label:'Vice President', cls:'role-vice'},
  senior:        {label:'Senior',         cls:'role-senior'},
  member:        {label:'Member',         cls:'role-member'},
};
function roleInfo(r){ return ROLES[r]||{label:r||'Member',cls:'role-member'}; }
function rankCls(i) { return i===0?'gold':i===1?'silver':i===2?'bronze':''; }

// ── MODAL ──
function openModal(id)  { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
document.querySelectorAll('.modal').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('active');}));

function switchTab(t) {
  const l=t==='login';
  document.getElementById('form-login').style.display=l?'':'none';
  document.getElementById('form-reg').style.display=l?'none':'';
  document.getElementById('tab-l').classList.toggle('active',l);
  document.getElementById('tab-r').classList.toggle('active',!l);
}

// ── AUTH ──
function getUser(){try{return JSON.parse(localStorage.getItem('auth_user'));}catch{return null;}}
function updateAuthUI(){
  const u=getUser();
  document.getElementById('admin-panel').style.display=(u?.role==='admin')?'':'none';
  if(!u) return;
  const a=u.role==='admin';
  document.getElementById('auth-ui').innerHTML=`
    <div style="display:flex;align-items:center;gap:8px">
      <div class="user-pill">
        <div class="user-avatar-sm">${a?'👑':'👤'}</div>
        <div><div class="user-name-txt">${u.login}</div><div class="user-role-txt">${a?'Admin':'Участник'}</div></div>
      </div>
      <button class="btn" onclick="logout()">Выйти</button>
    </div>`;
}
function logout(){localStorage.removeItem('auth_user');location.reload();}

async function handleLogin(){
  const login=document.getElementById('l-user').value.trim();
  const password=document.getElementById('l-pass').value;
  const err=document.getElementById('l-err'); err.textContent='';
  if(!login||!password){err.textContent='Заполни все поля';return;}
  try{
    const r=await fetch(`${API}/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login,password})});
    const d=await r.json();
    if(r.ok){localStorage.setItem('auth_user',JSON.stringify({login:d.login,role:d.role}));closeModal('m-auth');updateAuthUI();}
    else err.textContent=d.error||'Неверные данные';
  }catch{err.textContent='Ошибка соединения';}
}

async function handleRegister(){
  const login=document.getElementById('r-user').value.trim();
  const pass=document.getElementById('r-pass').value;
  const pass2=document.getElementById('r-pass2').value;
  const err=document.getElementById('r-err'); err.textContent='';
  if(login.length<3){err.textContent='Логин минимум 3 символа';return;}
  if(pass.length<6){err.textContent='Пароль минимум 6 символов';return;}
  if(pass!==pass2){err.textContent='Пароли не совпадают';return;}
  try{
    const r=await fetch(`${API}/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login,password:pass})});
    const d=await r.json();
    if(r.ok){localStorage.setItem('auth_user',JSON.stringify({login:d.login,role:'user'}));closeModal('m-auth');updateAuthUI();}
    else err.textContent=d.error||'Ошибка';
  }catch{err.textContent='Ошибка соединения';}
}

async function postNews(){
  const title=document.getElementById('a-title').value.trim();
  const img=document.getElementById('a-img').value.trim();
  const content=document.getElementById('a-content').value.trim();
  const err=document.getElementById('a-err'); err.textContent=''; err.style.color='';
  if(!title){err.textContent='Введи заголовок';return;}
  try{
    const r=await fetch(`${API}/news`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,cover_url:img,content})});
    const d=await r.json();
    if(r.ok){
      document.getElementById('a-title').value='';
      document.getElementById('a-img').value='';
      document.getElementById('a-content').value='';
      err.style.color='var(--green)'; err.textContent='✓ Опубликовано';
      setTimeout(()=>{err.textContent='';err.style.color='';},3000);
      init();
    } else err.textContent=d.error||'Ошибка';
  }catch{err.textContent='Ошибка соединения';}
}

// ── MEMBERS ──
function renderMembers(){
  const vis=allMembers.slice(0,showCount);
  document.getElementById('members-list').innerHTML=vis.map((m,i)=>{
    const ri=roleInfo(m.role);
    const iconUrl=m.iconId?`https://cdn.brawlify.com/profile-icons/regular/${m.iconId}.png`:'';
    return `
    <div class="member-row">
      <div class="m-rank ${rankCls(i)}">${i+1}</div>
      <div class="m-avatar">${iconUrl?`<img src="${iconUrl}" alt="" onerror="this.parentElement.innerHTML='👤'">`:'👤'}</div>
      <div class="m-info">
        <div class="m-name">${m.name}</div>
        <div class="m-role ${ri.cls}">${ri.label}</div>
      </div>
      <div class="m-tag-col">${m.tag}</div>
      <div class="m-trophies">${m.trophies.toLocaleString()} 🏆</div>
    </div>`;
  }).join('');
  document.getElementById('show-more-btn').style.display=allMembers.length>showCount?'':'none';
}
function showMore(){showCount+=5;renderMembers();}

// ── NEWS ──
function openNews(n){
  const img=document.getElementById('nm-img');
  img.src=n.image_url||''; img.style.display=n.image_url?'block':'none';
  document.getElementById('nm-title').textContent=n.title||'';
  document.getElementById('nm-date').textContent=(n.created_at||'').split(' ')[0];
  document.getElementById('nm-body').textContent=n.content||'';
  openModal('m-news');
}

// ── INIT ──
async function init(){
  updateAuthUI();
  try{
    const res=await fetch(`${API}/data`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();

    // Stats
    const members=data.club?.members||[];
    allMembers=members.sort((a,b)=>b.trophies-a.trophies);
    const totalTr=members.reduce((s,m)=>s+m.trophies,0);
    const avg=members.length?Math.round(totalTr/members.length):0;
    document.getElementById('stat-members').textContent=members.length||'—';
    document.getElementById('stat-trophies').textContent=totalTr?fmtK(totalTr):'—';
    document.getElementById('stat-avg').textContent=avg?fmtK(avg):'—';

    // Members
    if(allMembers.length) renderMembers();
    else document.getElementById('members-list').innerHTML='<div class="empty">Нет данных</div>';

    // Chart data
    chartData=(data.chart||[])
      .map(p=>({time:parseInt(p.time),value:parseInt(p.value)}))
      .filter(p=>p.time>0&&p.value>0);

    if(chartData.length<2){
      const now=Math.floor(Date.now()/1000);
      const tr=totalTr||209093;
      chartData=[
        {time:now-86400*6,value:Math.round(tr*0.92)},
        {time:now-86400*5,value:Math.round(tr*0.94)},
        {time:now-86400*4,value:Math.round(tr*0.95)},
        {time:now-86400*3,value:Math.round(tr*0.96)},
        {time:now-86400*2,value:Math.round(tr*0.97)},
        {time:now-86400,  value:Math.round(tr*0.985)},
        {time:now,        value:tr},
      ];
    }
    filteredData=[...chartData];
    resizeCanvas();

    // News
    const news=data.news||[];
    document.getElementById('news-grid').innerHTML=news.length
      ?news.map(n=>`
        <div class="glass news-card" onclick='openNews(${JSON.stringify(n).replace(/'/g,"&#39;")})'>
          <div class="news-thumb"><img src="${n.image_url||''}" alt="" onerror="this.style.display='none'"></div>
          <div class="news-body">
            <div class="news-title">${n.title||''}</div>
            <div class="news-date">${(n.created_at||'').split(' ')[0]}</div>
          </div>
        </div>`).join('')
      :'<div class="empty" style="grid-column:1/-1">Новостей пока нет</div>';

  }catch(e){
    console.error(e);
    document.getElementById('members-list').innerHTML=`<div class="empty" style="color:var(--red)">Ошибка: ${e.message}</div>`;
    document.getElementById('news-grid').innerHTML='';
  }
}

document.addEventListener('keydown',e=>{
  if(e.key!=='Enter') return;
  const fl=document.getElementById('form-login');
  if(fl&&fl.style.display!=='none') handleLogin(); else handleRegister();
});

init();
</script>
