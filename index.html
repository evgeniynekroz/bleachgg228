<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLEACH | GG</title>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: #D8D0C8; overflow-x: hidden; }
.hero { background: linear-gradient(175deg, #1a3a8f 0%, #0f2060 40%, #1a5c2a 100%); position: relative; padding: 40px 20px; min-height: 500px; overflow: hidden; color: #fff; text-align: center; }
.hero h1 { font-family: 'Lilita One', cursive; font-size: 80px; text-transform: uppercase; text-shadow: 4px 4px 0 #000; margin-bottom: 10px; }
.tag-badge { background: #FFCC00; color: #000; padding: 5px 20px; border-radius: 50px; font-weight: 900; display: inline-block; box-shadow: 0 4px 0 #B28F00; }
.container { max-width: 1200px; margin: -50px auto 50px; padding: 0 20px; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; position: relative; z-index: 10; }
.card { background: #fff; border-radius: 20px; border: 4px solid #000; padding: 20px; box-shadow: 8px 8px 0 rgba(0,0,0,0.1); }
.member-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 2px solid #eee; font-weight: 800; }
.member-item:last-child { border: none; }
.trophies { color: #FF9900; }
.news-grid { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
.polaroid { background: #fff; padding: 10px 10px 30px; border: 3px solid #000; transform: rotate(-2deg); transition: 0.3s; }
.polaroid:hover { transform: rotate(0deg) scale(1.05); }
.polaroid img { width: 100%; height: 150px; object-cover: cover; border: 2px solid #000; }
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
.modal.active { display: flex; }
.admin-form { background: #fff; padding: 30px; border: 5px solid #000; border-radius: 20px; width: 300px; }
input { width: 100%; padding: 10px; margin-bottom: 10px; border: 3px solid #000; border-radius: 10px; font-weight: 800; }
.btn { background: #FFCC00; border: 3px solid #000; padding: 10px; width: 100%; font-weight: 900; cursor: pointer; border-radius: 10px; box-shadow: 0 4px 0 #000; }
.btn:active { box-shadow: none; transform: translateY(4px); }
</style>
</head>
<body>

<section class="hero">
    <h1>BLEACH | GG</h1>
    <div class="tag-badge">#CLLRR228</div>
    <div id="auth-section" style="margin-top: 20px;">
        <button onclick="openModal()" class="btn" style="width: auto; padding: 5px 15px;">ADMIN LOGIN</button>
    </div>
</section>

<div class="container">
    <div class="card">
        <h2 style="font-family:'Lilita One';margin-bottom:15px">PROGRESS</h2>
        <div id="chart-container" style="height: 300px;"></div>
    </div>

    <div class="card">
        <h2 style="font-family:'Lilita One';margin-bottom:15px">TOP PLAYERS</h2>
        <div id="members-list">Загрузка...</div>
    </div>

    <div class="news-grid" id="news-grid"></div>
</div>

<div id="login-modal" class="modal">
    <div class="admin-form">
        <h2 style="margin-bottom:15px">LOGIN</h2>
        <input type="text" id="l-user" placeholder="LOGIN">
        <input type="password" id="l-pass" placeholder="PASSWORD">
        <div id="l-err" style="color:red; font-size:10px; margin-bottom:10px"></div>
        <button onclick="handleLogin()" class="btn">ENTER</button>
        <button onclick="closeModal()" style="margin-top:10px; font-size:10px; opacity:0.5; border:none; background:none; cursor:pointer; width:100%">CLOSE</button>
    </div>
</div>

<script>
    const API = 'https://bleach1.evgen20111110.workers.dev/api';

    function openModal() { document.getElementById('login-modal').classList.add('active'); }
    function closeModal() { document.getElementById('login-modal').classList.remove('active'); }

    async function handleLogin() {
        const login = document.getElementById('l-user').value;
        const password = document.getElementById('l-pass').value;
        const res = await fetch(`${API}/login`, {
            method: 'POST',
            body: JSON.stringify({ login, password })
        });
        const data = await res.json();
        if (data.success) {
            localStorage.setItem('bleach_auth', JSON.stringify(data));
            location.reload();
        } else {
            document.getElementById('l-err').innerText = 'Access Denied';
        }
    }

    async function init() {
        const auth = localStorage.getItem('bleach_auth');
        if (auth) {
            document.getElementById('auth-section').innerHTML = `<span style="font-weight:900">ADMIN: ${JSON.parse(auth).login}</span> <button onclick="localStorage.clear();location.reload()" style="font-size:10px;margin-left:10px;color:white;cursor:pointer">EXIT</button>`;
        }

        try {
            const r = await fetch(`${API}/data`);
            const data = await r.json();

            // Топ игроков
            document.getElementById('members-list').innerHTML = data.club.members.sort((a,b)=>b.trophies-a.trophies).slice(0,10).map((m, i) => `
                <div class="member-item">
                    <span>${i+1}. ${m.name}</span>
                    <span class="trophies">${m.trophies} 🏆</span>
                </div>
            `).join('');

            // График
            const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
                layout: { background: { color: 'transparent' }, textColor: '#000' },
                grid: { vertLines: { visible: false }, horzLines: { color: '#eee' } },
            });
            const line = chart.addLineSeries({ color: '#1a3a8f', lineWidth: 4 });
            const chartData = data.chart.map(p => ({ time: parseInt(p.time), value: parseInt(p.value) }));
            line.setData(chartData.length ? chartData : [{time: Math.floor(Date.now()/1000), value: 0}]);
            chart.timeScale().fitContent();

            // Новости
            document.getElementById('news-grid').innerHTML = data.news.map(n => `
                <div class="polaroid">
                    <img src="${n.image_url || 'https://via.placeholder.com/150'}">
                    <div style="font-weight:900; margin-top:10px; font-size:14px">${n.title}</div>
                    <div style="font-size:10px; opacity:0.5">${n.created_at.split(' ')[0]}</div>
                </div>
            `).join('');

        } catch(e) { console.error(e); }
    }
    init();
</script>
</body>
</html>
